version: "3.8"

services:
  crudapi:
    image: ghcr.io/web-svc/crudapi:latest
    container_name: crudapi
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-8080}:80"
    volumes:
      # Persistent storage — DO NOT REMOVE
      # Contains: admin DB, audit logs, sessions, sqlite files, hangfire
      - ./data:/app/Data
    environment:
      - ASPNETCORE_URLS=http://+:80
      - ASPNETCORE_ENVIRONMENT=Production

      # Branding (override in .env)
      - Docs__ProductName=${PRODUCT_NAME:-CrudApi}
      - Docs__GithubUrl=${GITHUB_URL:-https://github.com/web-svc/crudapi}
      - Docs__SupportEmail=${SUPPORT_EMAIL:-}

      # Secrets (recommended via .env file, not here)
      # - AI__ApiKey=${AI_API_KEY}
      # - GitHub__Token=${GITHUB_TOKEN}

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
